<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProMint</title>
    <link rel="stylesheet" href="home.css">
</head>

<body class="body">
    <section class="menu">
        <div class="logo">
            <img src="../assets/logo.png" alt="cannot display image" class="
            image">
        </div>
        <nav class = 'navbar'>
            <div class="n1">Home</div>
            <div class="n2">Explore</div>
            <div class="n3">
                <button class="login-button">Login</button>

                <div class="blur-effect"></div>     <!--To add blur effect to an empty but full page spanning element-->

                <div class="login-popup">
                    <div class="login-popup-header">LOGIN WITH WALLET</div>

                    <div class="login-popup-content">
                        <br>
                        <input type="text" class="walletSearch" placeholder="Search your wallet...">
                        
                        <div class="wallet-options">
                            <div class="option1">Metamask</div>
                            <div class="option2">Coinbase</div>
                            <div class="option3">Trust Wallet</div>
                        </div>

                        <br><br>
                        <button class="back">Back</button>
                    </div>
                </div>
            </div>
        </nav>
    </section>

    <br>

    <section class="intro">
        <h1 class="wel1">- - - Welcome to ProMint - - -<br><br>
            Get Your Projects Minted, Become Celebrated!
        </h1>
    </section>

    <br><br>
    <section class="project-display">
        <h1 class="wardrobe-title">Top Projects</h1>
        <br>

        <div class="wardrobe">
            <div class="pro1"></div>
            <div class="pro2"></div>
            <div class="pro3"></div>
        </div>
    </section>

    <script src="app.js"></script>     <!-- script should be at the bottom, because the html elements don't exist yet -->
</body>

</html>
